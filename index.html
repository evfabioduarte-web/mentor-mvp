<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Business Plan Fix</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f5;}
header{background:#1D4E89;color:#fff;padding:15px;text-align:center;}
.container{padding:15px;}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input,textarea,button{width:100%;padding:10px;margin:5px 0;}
.step{display:none;}
.active{display:block;}
.guide{background:#eef5ff;border-left:5px solid #1D4E89;padding:10px;margin-bottom:10px;}
.bar{height:10px;background:#1D4E89;width:0%;border-radius:5px;}
.progress{background:#ddd;border-radius:5px;margin-bottom:10px;}
</style>
</head>

<body>

<header>
<h2>🧠 Plano de Negócio Inteligente</h2>
</header>

<div class="container">

<div class="progress"><div class="bar" id="bar"></div></div>

<!-- IDEIA -->
<div class="card step active" id="step1">
<h3>1. IDEIA</h3>

<div class="guide" id="g1"></div>

<input id="ideaName">
<textarea id="ideaText"></textarea>

<button onclick="next(2)">Próximo</button>
</div>

<!-- MERCADO -->
<div class="card step" id="step2">
<h3>2. MERCADO</h3>
<div class="guide" id="g2"></div>

<textarea id="marketText"></textarea>

<button onclick="next(3)">Próximo</button>
</div>

<!-- LOCAL -->
<div class="card step" id="step3">
<h3>3. LOCAL</h3>
<div class="guide" id="g3"></div>

<textarea id="localText"></textarea>

<button onclick="next(4)">Próximo</button>
</div>

<!-- FINANCEIRO -->
<div class="card step" id="step4">
<h3>4. FINANCEIRO</h3>
<div class="guide" id="g4"></div>

<input id="price">
<input id="cost">
<input id="sales">
<input id="fixed">

<button onclick="calc()">Calcular</button>

<div id="finance"></div>

<button onclick="next(5)">Próximo</button>
</div>

<!-- OPERAÇÃO -->
<div class="card step" id="step5">
<h3>5. OPERAÇÃO</h3>
<div class="guide" id="g5"></div>

<textarea id="opText"></textarea>

<button onclick="next(6)">Próximo</button>
</div>

<!-- LEGAL -->
<div class="card step" id="step6">
<h3>6. LEGAL</h3>
<div class="guide" id="g6"></div>

<textarea id="legalText"></textarea>

<button onclick="next(7)">Próximo</button>
</div>

<!-- REAL -->
<div class="card step" id="step7">
<h3>7. REALIDADE</h3>
<div class="guide" id="g7"></div>

<input id="realProfit">
<textarea id="realText"></textarea>

<button onclick="compare()">Comparar</button>

<div id="compare"></div>

<button onclick="next(8)">Próximo</button>
</div>

<!-- RELATÓRIO -->
<div class="card step" id="step8">
<h3>8. RELATÓRIO</h3>

<div id="report"></div>

<button onclick="generate()">Gerar</button>
<button onclick="reset()">Reiniciar</button>
</div>

</div>

<script>

let data = {};

const guides = {
1:"Defina nome, produto e público.",
2:"Valide demanda e concorrência.",
3:"Escolha local com fluxo.",
4:"Simule lucro antes de investir.",
5:"Padronize operação.",
6:"Regularize legalmente.",
7:"Compare teoria vs realidade."
};

// carregar guias corretamente
function loadGuides(){
for(let i=1;i<=7;i++){
document.getElementById("g"+i).innerHTML = guides[i];
}
}
loadGuides();

// navegação segura
function next(n){
document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");
document.getElementById("bar").style.width=(n*12.5)+"%";
if(n===8) generate();
}

// cálculo seguro
function calc(){

let p = Number(document.getElementById("price").value)||35;
let c = Number(document.getElementById("cost").value)||18;
let s = Number(document.getElementById("sales").value)||40;
let f = Number(document.getElementById("fixed").value)||6000;

let profit = ((p-c)*s*30)-f;
let margin = ((p-c)/p)*100;

data = {profit,margin};

document.getElementById("finance").innerHTML =
`Lucro: R$ ${profit.toFixed(2)}<br>Margem: ${margin.toFixed(2)}%`;

}

// comparação segura
function compare(){

let real = Number(document.getElementById("realProfit").value)||0;

document.getElementById("compare").innerHTML =
`Diferença: R$ ${(real-data.profit).toFixed(2)}`;

}

// relatório confiável
function generate(){

report.innerHTML = `
<h3>📘 RELATÓRIO FINAL</h3>

<b>Ideia:</b><br>${ideaName.value}<br>${ideaText.value}<br><br>

<b>Mercado:</b><br>${marketText.value}<br><br>

<b>Local:</b><br>${localText.value}<br><br>

<b>Financeiro:</b><br>
Lucro: ${data.profit?.toFixed(2)||0}<br>
Margem: ${data.margin?.toFixed(2)||0}%<br><br>

<b>Operação:</b><br>${opText.value}<br><br>

<b>Legal:</b><br>${legalText.value}<br><br>

<b>Realidade:</b><br>${realText.value}<br><br>

<b>Decisão:</b><br>
${data.profit>0?"✔ Viável":"❌ Não viável"}
`;

}

// reset robusto
function reset(){
location.reload();
}

</script>

</body>
</html>
